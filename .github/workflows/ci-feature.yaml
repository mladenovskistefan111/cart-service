name: CI - Feature

on:
  workflow_dispatch:  # manual trigger via GitHub Actions UI

  # push:
  #   branches-ignore:
  #     - main

jobs:
  # ─── STAGE 1 (parallel) ───────────────────────────────────────────────────

  lint-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version-file: 'global.json'

      - name: Restore tools
        run: dotnet tool restore

      - name: Check formatting
        run: dotnet format --verify-no-changes --verbosity diagnostic

      - name: Lint (Roslyn Analyzers)
        run: dotnet build cartservice.sln --configuration Release /warnaserror

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version-file: 'global.json'

      - name: Build
        run: dotnet build src/cartservice.csproj --configuration Release

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so gitleaks scans all commits in the push

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── STAGE 2 ──────────────────────────────────────────────────────────────

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [lint-format, build, secret-scan]  # only runs if stage 1 fully passes
    permissions:
      contents: read
      checks: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version-file: 'global.json'

      - name: Restore dependencies
        run: dotnet restore tests/cartservice.tests.csproj

      - name: Run unit tests
        run: |
          dotnet test tests/cartservice.tests.csproj \
            --configuration Release \
            --no-restore \
            --filter "FullyQualifiedName!~Integration&FullyQualifiedName!~E2E" \
            --logger "trx;LogFileName=unit-test-results.trx" \
            --results-directory ./test-results

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Unit Test Results
          path: test-results/unit-test-results.trx
          reporter: dotnet-trx